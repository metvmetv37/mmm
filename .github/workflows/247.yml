name: 247 M3U Playlist

on:
  schedule:
    - cron: '0 * * * *'

  workflow_dispatch:
    inputs:
      debug:
        description: 'Debug mode'
        required: false
        default: 'false'
        type: boolean

  push:
    branches:
      - main
    paths:
      - '247.py'
      - 'channels.txt'
      - '.github/workflows/update_m3u.yml'

concurrency:
  group: update-m3u
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-22.04  # ← 22.04 kullan, 24.04'te paket adları değişti
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ─── Sistem bağımlılıkları (22.04 uyumlu) ───
      - name: 📦 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libnss3 \
            libnspr4 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libdbus-1-3 \
            libxkbcommon0 \
            libatspi2.0-0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2 \
            libx11-xcb1 \
            fonts-liberation \
            xvfb \
            wget \
            ca-certificates

      # ─── Python bağımlılıkları ───
      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 playwright
          python -m playwright install chromium
          python -m playwright install-deps chromium

      # ─── Scraper çalıştır ───
      - name: 🔍 Run stream finder
        id: scraper
        run: |
          echo "Starting stream finder..."
          python 247.py 2>&1 | tee scraper_output.log
          EXIT_CODE=${PIPESTATUS[0]}

          if [ -f "tv247.m3u" ]; then
            CHANNEL_COUNT=$(grep -c "^#EXTINF" tv247.m3u || echo "0")
            echo "✅ M3U dosyası oluşturuldu ($CHANNEL_COUNT kanal)"
            echo "m3u_created=true" >> $GITHUB_OUTPUT
            echo "channel_count=$CHANNEL_COUNT" >> $GITHUB_OUTPUT
            cat tv247.m3u
          else
            echo "❌ M3U dosyası oluşturulamadı"
            echo "m3u_created=false" >> $GITHUB_OUTPUT
            echo "channel_count=0" >> $GITHUB_OUTPUT
          fi
        env:
          PYTHONUNBUFFERED: "1"

      # ─── M3U doğrulama ───
      - name: ✅ Validate M3U
        if: steps.scraper.outputs.m3u_created == 'true'
        run: |
          CHANNEL_COUNT=$(grep -c "^#EXTINF" tv247.m3u || echo "0")
          URL_COUNT=$(grep -c "^http" tv247.m3u || echo "0")
          echo "Kanal: $CHANNEL_COUNT | URL: $URL_COUNT"

          if [ "$CHANNEL_COUNT" -eq "0" ]; then
            echo "⚠️ Kanal bulunamadı, önceki dosya korunuyor"
            git checkout HEAD -- tv247.m3u 2>/dev/null || true
          fi

      # ─── Commit & Push ───
      - name: 📤 Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add -f tv247.m3u

          if git diff --cached --quiet; then
            echo "ℹ️ Değişiklik yok, commit atlanıyor"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            CHANNEL_COUNT=$(grep -c "^#EXTINF" tv247.m3u || echo "0")
            git commit -m "🔄 Update playlist | ${TIMESTAMP} | ${CHANNEL_COUNT} channels"
            git push
            echo "✅ Push edildi"
          fi

      # ─── Hata logları ───
      - name: 📋 Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_number }}
          path: |
            scraper_output.log
            tv247.m3u
          retention-days: 7

      # ─── Özet ───
      - name: 📊 Summary
        if: always()
        run: |
          echo "## 📺 TV247 M3U Update" >> $GITHUB_STEP_SUMMARY
          echo "| Alan | Değer |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY

          if [ -f "tv247.m3u" ]; then
            COUNT=$(grep -c "^#EXTINF" tv247.m3u || echo "0")
            echo "| Durum | ✅ Başarılı |" >> $GITHUB_STEP_SUMMARY
            echo "| Kanal Sayısı | ${COUNT} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Durum | ❌ Başarısız |" >> $GITHUB_STEP_SUMMARY
            echo "| Kanal Sayısı | 0 |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "| Zaman | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY

          if [ -f "tv247.m3u" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### M3U İçeriği" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat tv247.m3u >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
